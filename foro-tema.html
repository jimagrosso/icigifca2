<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tema — Foro ICIGIFCA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;font-family:'DM Sans',sans-serif;background:#080E0E;color:#E8E8E4}
:root{
  --teal:#00C9A7;--teal-dim:rgba(0,201,167,0.08);--teal-border:rgba(0,201,167,0.2);
  --gold:#C9A84C;--gold-dim:rgba(201,168,76,0.08);--gold-border:rgba(201,168,76,0.25);
  --ink:#080E0E;--ink2:#0D1515;--ink3:#141F1F;--ink4:#1A2828;
  --border:rgba(255,255,255,0.07);--muted:rgba(232,232,228,0.38);--muted2:rgba(232,232,228,0.65);
}
.topbar{height:56px;background:var(--ink2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100}
.logo{font-family:'Syne',sans-serif;font-size:12px;font-weight:800;letter-spacing:3px;color:#fff;text-transform:uppercase;text-decoration:none}
.logo span{color:var(--teal)}
.btn-back{color:var(--muted);font-size:12px;text-decoration:none;transition:color .2s}
.btn-back:hover{color:#fff}
.user-pill{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted2)}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--teal-dim);border:1px solid var(--teal-border);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--teal)}

.wrap{max-width:820px;margin:0 auto;padding:32px 24px}

/* POST ORIGINAL */
.post-original{background:var(--ink2);border:1px solid var(--teal-border);padding:28px;margin-bottom:2px}
.post-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.post-autor-info{display:flex;align-items:center;gap:12px}
.autor-avatar{width:40px;height:40px;border-radius:50%;background:var(--teal-dim);border:1px solid var(--teal-border);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--teal);flex-shrink:0}
.autor-nombre{font-size:13px;font-weight:500;color:#fff}
.autor-esp{font-size:11px;color:var(--teal)}
.post-date{font-size:11px;color:var(--muted)}
.post-cat-badge{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:3px 10px;border:1px solid var(--teal-border);color:var(--teal);margin-bottom:12px;display:inline-block}
.post-cat-badge.caso{border-color:var(--gold-border);color:var(--gold)}
.post-cat-badge.pregunta{border-color:rgba(100,180,255,0.3);color:#64B4FF}
.post-cat-badge.debate{border-color:rgba(200,100,255,0.3);color:#C864FF}
.post-titulo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#fff;line-height:1.3;margin-bottom:16px}
.post-cuerpo{font-size:14px;color:var(--muted2);line-height:1.8;white-space:pre-wrap;word-break:break-word}
.post-imagen{margin-top:16px;max-width:100%;max-height:400px;border:1px solid var(--border);cursor:pointer;transition:opacity .2s}
.post-imagen:hover{opacity:.85}

/* SEPARADOR REPLIES */
.replies-header{display:flex;align-items:center;gap:12px;margin:24px 0 4px}
.replies-count-label{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--muted2);letter-spacing:1px;text-transform:uppercase}
.replies-line{flex:1;height:1px;background:var(--border)}

/* REPLY CARD */
.reply-card{background:var(--ink2);border:1px solid var(--border);border-left:2px solid var(--teal-border);padding:20px 24px;margin-bottom:2px}
.reply-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.reply-autor{display:flex;align-items:center;gap:10px}
.reply-avatar{width:32px;height:32px;border-radius:50%;background:var(--ink4);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--muted2);flex-shrink:0}
.reply-nombre{font-size:12px;font-weight:500;color:#fff}
.reply-esp{font-size:10px;color:var(--muted)}
.reply-date{font-size:10px;color:var(--muted)}
.reply-cuerpo{font-size:13px;color:var(--muted2);line-height:1.7;white-space:pre-wrap;word-break:break-word}
.reply-imagen{margin-top:12px;max-width:100%;max-height:300px;border:1px solid var(--border)}

/* FORMULARIO RESPUESTA */
.reply-form{margin-top:24px;background:var(--ink2);border:1px solid var(--border);padding:24px}
.reply-form-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--muted2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px}
.form-textarea{width:100%;background:var(--ink3);border:1px solid var(--border);color:#fff;padding:12px 16px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;resize:vertical;min-height:100px;transition:border .2s}
.form-textarea:focus{border-color:var(--teal-border)}
.form-textarea::placeholder{color:var(--muted)}
.reply-actions{display:flex;align-items:center;justify-content:space-between;margin-top:12px;gap:12px;flex-wrap:wrap}
.form-file-mini{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:11px;color:var(--muted);transition:color .2s}
.form-file-mini:hover{color:var(--teal)}
.form-file-mini input{display:none}
.img-mini-preview{display:none;margin-top:8px}
.img-mini-preview img{max-width:120px;max-height:80px;border:1px solid var(--border)}
.btn-reply{padding:10px 24px;background:var(--teal);border:none;color:#080E0E;font-size:11px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;letter-spacing:1.5px;text-transform:uppercase}
.btn-reply:hover{background:#00E0BC}
.btn-reply:disabled{opacity:.5;cursor:not-allowed}

/* ACCESO BLOQUEADO REPLY */
.reply-locked{background:var(--ink2);border:1px solid var(--border);padding:20px 24px;margin-top:24px;text-align:center}
.reply-locked p{font-size:13px;color:var(--muted);margin-bottom:12px}
.btn-login{padding:8px 20px;background:transparent;border:1px solid var(--teal-border);color:var(--teal);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;text-decoration:none;display:inline-block;transition:all .2s}
.btn-login:hover{background:var(--teal-dim)}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--muted)}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--ink3);border:1px solid var(--teal-border);padding:12px 20px;font-size:13px;color:var(--teal);z-index:300;transform:translateY(80px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}

/* IMAGEN MODAL */
.img-modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:400;display:none;align-items:center;justify-content:center;cursor:pointer}
.img-modal.open{display:flex}
.img-modal img{max-width:90vw;max-height:90vh;border:1px solid var(--border)}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="logo">ICIGI<span>IFCA</span></a>
  <a href="foro.html" class="btn-back">← Volver al foro</a>
  <div class="user-pill">
    <div class="user-avatar" id="userAvatar">?</div>
    <span id="userName">...</span>
  </div>
</div>

<div class="wrap">
  <div id="contenido"><div class="loading">Cargando tema...</div></div>
</div>

<!-- IMAGEN AMPLIADA -->
<div class="img-modal" id="imgModal" onclick="this.classList.remove('open')">
  <img id="imgModalSrc" src="">
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
async function registrarPuntosForo(tipo, puntos, descripcion) {
  try {
    const { data: periodo } = await getSb().from('ranking_periodos').select('id').eq('activo', true).single();
    if (!periodo) return;
    await getSb().from('puntos_historial').insert({
      user_id: currentUser.id,
      periodo_id: periodo.id,
      tipo,
      puntos,
      descripcion
    });
  } catch(e) { console.log('Puntos foro error:', e); }
}

</script>
<script>
const SUPABASE_URL = 'https://ejuvegzsuxcgazmeieed.supabase.co';
const SUPABASE_KEY = 'sb_publishable_iSYiJpecbqoVf-QCJ3AxFQ_vbdoV4t2';

var sb = null;
var currentUser = null;
var puedeResponder = false;
var imagenReplyB64 = null;

function getSb(){if(!sb)sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);return sb;}

const postId = new URLSearchParams(location.search).get('id');

window.addEventListener('load', async () => {
  if (!postId) { document.getElementById('contenido').innerHTML = '<div class="loading">Post no encontrado</div>'; return; }

  const { data: { session } } = await getSb().auth.getSession();
  if (session) {
    currentUser = session.user;
    const firstName = currentUser.user_metadata?.full_name?.split(' ')[0] || currentUser.email.split('@')[0];
    document.getElementById('userName').textContent = firstName;
    document.getElementById('userAvatar').textContent = firstName.charAt(0).toUpperCase();

    const { data: profile } = await getSb().from('profiles').select('paid, forum_approved').eq('id', currentUser.id).single();
    if (profile?.paid || profile?.forum_approved) puedeResponder = true;
  } else {
    document.getElementById('userName').textContent = 'Visitante';
  }

  await cargarTema();
  // Incrementar vistas
  getSb().from('forum_posts').update({ vistas: (Math.random() * 999 | 0) + 1 }).eq('id', postId).then(() => {});
});

async function cargarTema() {
  const { data: post, error } = await getSb().from('forum_posts').select('*').eq('id', postId).single();
  if (error || !post) { document.getElementById('contenido').innerHTML = '<div class="loading">Post no encontrado</div>'; return; }

  const { data: replies } = await getSb().from('forum_replies').select('*').eq('post_id', postId).order('created_at', { ascending: true });

  const catClass = { 'Caso Clínico': 'caso', 'Pregunta': 'pregunta', 'Debate': 'debate' };
  const timeAgo = (iso) => {
    const diff = Date.now() - new Date(iso);
    const m = Math.floor(diff / 60000);
    if (m < 60) return `hace ${m}m`;
    const h = Math.floor(m / 60);
    if (h < 24) return `hace ${h}h`;
    return `hace ${Math.floor(h / 24)}d`;
  };

  const repliesHTML = (replies || []).map(r => `
    <div class="reply-card">
      <div class="reply-header">
        <div class="reply-autor">
          <div class="reply-avatar">${(r.autor_nombre || 'A').charAt(0).toUpperCase()}</div>
          <div>
            <div class="reply-nombre">Dr/a. ${esc(r.autor_nombre || 'Anónimo')}</div>
            ${r.autor_especialidad ? `<div class="reply-esp">${esc(r.autor_especialidad)}</div>` : ''}
          </div>
        </div>
        <div class="reply-date">${timeAgo(r.created_at)}</div>
      </div>
      <div class="reply-cuerpo">${esc(r.contenido)}</div>
      ${r.imagen_url ? `<img class="reply-imagen" src="${r.imagen_url}" onclick="verImagen('${r.imagen_url}')" style="cursor:pointer">` : ''}
    </div>`).join('');

  const formHTML = puedeResponder ? `
    <div class="reply-form">
      <div class="reply-form-title">Añadir respuesta</div>
      <textarea class="form-textarea" id="replyTexto" placeholder="Escribe tu respuesta, aporte clínico o comentario..."></textarea>
      <div class="img-mini-preview" id="imgMiniPreview"><img id="imgMiniImg" src=""></div>
      <div class="reply-actions">
        <label class="form-file-mini">
          <input type="file" accept="image/*" onchange="previewReplyImg(this)">
          📷 Adjuntar imagen
        </label>
        <button class="btn-reply" id="btnReply" onclick="responder()">Responder →</button>
      </div>
    </div>` : `
    <div class="reply-locked">
      <p>${currentUser ? 'Necesitas acceso aprobado para responder en el foro.' : 'Inicia sesión para participar en el foro.'}</p>
      ${currentUser ? `<a href="foro-solicitud.html" class="btn-login">Solicitar acceso →</a>` : `<a href="login.html" class="btn-login">Iniciar sesión →</a>`}
    </div>`;

  document.getElementById('contenido').innerHTML = `
    <div class="post-original">
      <div class="post-header">
        <div class="post-autor-info">
          <div class="autor-avatar">${(post.autor_nombre || 'A').charAt(0).toUpperCase()}</div>
          <div>
            <div class="autor-nombre">Dr/a. ${esc(post.autor_nombre || 'Anónimo')}</div>
            ${post.autor_especialidad ? `<div class="autor-esp">${esc(post.autor_especialidad)}</div>` : ''}
          </div>
        </div>
        <div class="post-date">${timeAgo(post.created_at)}</div>
      </div>
      <div class="post-cat-badge ${catClass[post.categoria] || ''}">${esc(post.categoria)}</div>
      <div class="post-titulo">${esc(post.titulo)}</div>
      <div class="post-cuerpo">${esc(post.contenido)}</div>
      ${post.imagen_url ? `<img class="post-imagen" src="${post.imagen_url}" onclick="verImagen('${post.imagen_url}')">` : ''}
    </div>

    <div class="replies-header">
      <div class="replies-count-label">${(replies || []).length} respuestas</div>
      <div class="replies-line"></div>
    </div>

    ${repliesHTML || '<div style="text-align:center;padding:24px;color:var(--muted);font-size:13px">Sé el primero en responder</div>'}

    ${formHTML}`;
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function verImagen(src) {
  document.getElementById('imgModalSrc').src = src;
  document.getElementById('imgModal').classList.add('open');
}

function previewReplyImg(input) {
  const file = input.files[0];
  if (!file || file.size > 5 * 1024 * 1024) { toast('Máx 5MB'); return; }
  const reader = new FileReader();
  reader.onload = (e) => {
    imagenReplyB64 = e.target.result;
    document.getElementById('imgMiniImg').src = imagenReplyB64;
    document.getElementById('imgMiniPreview').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

async function responder() {
  const texto = document.getElementById('replyTexto').value.trim();
  if (!texto) { toast('Escribe tu respuesta'); return; }
  const btn = document.getElementById('btnReply');
  btn.disabled = true; btn.textContent = 'Enviando...';

  const { data: profile } = await getSb().from('profiles').select('nombre_completo, perfil_profesional').eq('id', currentUser.id).single();
  const nombre = profile?.nombre_completo || currentUser.user_metadata?.full_name || currentUser.email.split('@')[0];

  const { error } = await getSb().from('forum_replies').insert({
    post_id: postId,
    user_id: currentUser.id,
    autor_nombre: nombre,
    autor_especialidad: profile?.perfil_profesional || '',
    contenido: texto,
    imagen_url: imagenReplyB64 || null
  });

  btn.disabled = false; btn.textContent = 'Responder →';
  if (error) { toast('Error al responder'); return; }

  // Registrar 2 puntos por responder
  await registrarPuntosForo('foro_reply', 2, 'Respuesta en el Foro Clínico');

  toast('✅ Respuesta publicada (+2 pts)');
  imagenReplyB64 = null;
  await cargarTema();
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
