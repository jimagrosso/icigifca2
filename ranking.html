<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ranking — ICIGIFCA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--teal:#00C9A7;--gold:#C9A84C;--ink:#080E0E;--ink2:#0D1515;--ink3:#111C1C;--border:rgba(255,255,255,0.07);--muted:#4A6060;--muted2:#8A9E9E;--fg:#E8E8E4}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--ink);color:var(--fg);font-family:'Inter',sans-serif;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:var(--ink2);border-bottom:1px solid var(--border)}
.logo{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;letter-spacing:3px;color:#fff;text-decoration:none}
.back-btn{color:var(--muted2);font-size:12px;text-decoration:none}
.back-btn:hover{color:var(--teal)}
.container{max-width:900px;margin:0 auto;padding:40px 24px}
.page-header{text-align:center;margin-bottom:40px}
.page-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#fff;margin-bottom:8px}
.page-sub{font-size:13px;color:var(--muted2)}
.periodo-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(0,201,167,0.08);border:1px solid rgba(0,201,167,0.2);color:var(--teal);padding:6px 16px;font-size:11px;letter-spacing:1px;border-radius:2px;margin-top:12px}
.dot{width:6px;height:6px;background:var(--teal);border-radius:50%;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.puntos-info{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:32px}
.info-card{background:var(--ink2);border:1px solid var(--border);padding:16px;border-radius:4px}
.info-ico{font-size:20px;margin-bottom:6px}
.info-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.info-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:#fff}
.podio{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:40px;align-items:end}
.podio-card{background:var(--ink2);border:1px solid var(--border);padding:20px 16px;text-align:center;border-radius:4px}
.podio-card.p1{border-color:rgba(201,168,76,0.5);background:rgba(201,168,76,0.06);transform:translateY(-8px)}
.podio-card.p2{border-color:rgba(180,180,180,0.3)}
.podio-card.p3{border-color:rgba(180,120,60,0.3)}
.podio-medal{font-size:32px;margin-bottom:8px}
.podio-pos{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.podio-name{font-weight:600;color:#fff;font-size:13px;margin-bottom:6px}
.podio-pts{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--teal)}
.podio-pts.gold{color:var(--gold)}
.tbl-wrap{background:var(--ink2);border:1px solid var(--border);border-radius:4px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 16px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);font-weight:600}
td{padding:14px 16px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--ink3)}
tr.mi-pos td{background:rgba(0,201,167,0.04);border-left:3px solid var(--teal)}
.av{width:34px;height:34px;border-radius:50%;background:var(--ink3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:var(--teal);flex-shrink:0}
.pts{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--teal);font-size:15px}
.badge{padding:2px 8px;border-radius:2px;font-size:9px;letter-spacing:1px;text-transform:uppercase;font-weight:600;margin-right:4px}
.bq{background:rgba(0,201,167,0.1);border:1px solid rgba(0,201,167,0.2);color:var(--teal)}
.bf{background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.2);color:var(--gold)}
.empty{text-align:center;padding:60px 24px;color:var(--muted);font-size:14px}
@media(max-width:640px){.podio{grid-template-columns:1fr}.puntos-info{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html" class="logo">ICIGIFCA</a>
  <a href="panel.html" class="back-btn" style="display:flex;align-items:center;gap:6px;background:var(--ink3);border:1px solid var(--border);padding:7px 14px;border-radius:4px;font-size:12px;font-weight:600">← Volver al campus</a>
</div>
<div class="container">
  <div class="page-header">
    <div class="page-title">🏆 Ranking del Campus</div>
    <div class="page-sub">Clasificación de doctores por periodo académico</div>
    <div class="periodo-badge"><span class="dot"></span><span id="periodoBadge">Cargando…</span></div>
  </div>
  <div class="puntos-info" id="misPuntos" style="display:none">
    <div class="info-card"><div class="info-ico">⭐</div><div class="info-label">Mis puntos totales</div><div class="info-val" id="miTotal">—</div></div>
    <div class="info-card"><div class="info-ico">📝</div><div class="info-label">Puntos por quiz</div><div class="info-val" id="miQuiz">—</div></div>
    <div class="info-card"><div class="info-ico">💬</div><div class="info-label">Puntos por foro</div><div class="info-val" id="miForo">—</div></div>
  </div>
  <div class="podio" id="podio" style="display:none">
    <div class="podio-card p2"><div class="podio-medal">🥈</div><div class="podio-pos">#2</div><div class="podio-name" id="p2n">—</div><div class="podio-pts" id="p2p">—</div></div>
    <div class="podio-card p1"><div class="podio-medal">🥇</div><div class="podio-pos">#1</div><div class="podio-name" id="p1n">—</div><div class="podio-pts gold" id="p1p">—</div></div>
    <div class="podio-card p3"><div class="podio-medal">🥉</div><div class="podio-pos">#3</div><div class="podio-name" id="p3n">—</div><div class="podio-pts" id="p3p">—</div></div>
  </div>
  <div id="rankingWrap"><div class="empty">⏳ Cargando ranking…</div></div>
</div>
<script>
const SUPA_URL='https://ejuvegzsuxcgazmeieed.supabase.co';
const SUPA_KEY='sb_publishable_iSYiJpecbqoVf-QCJ3AxFQ_vbdoV4t2';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);
let myId=null;

window.addEventListener('load',async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.replace('login.html');return;}
  myId=session.user.id;
  await cargar();
});

async function cargar(){
  const{data:periodo}=await sb.from('ranking_periodos').select('*').eq('activo',true).single();
  if(!periodo){document.getElementById('rankingWrap').innerHTML='<div class="empty">No hay un periodo activo.</div>';return;}
  document.getElementById('periodoBadge').textContent=periodo.nombre+' · '+fd(periodo.fecha_inicio)+' – '+fd(periodo.fecha_fin);

  const{data:puntos}=await sb.from('puntos_historial').select('user_id,puntos,tipo').eq('periodo_id',periodo.id);
  if(!puntos?.length){document.getElementById('rankingWrap').innerHTML='<div class="empty">🏁 El ranking arrancará cuando los doctores completen su primer quiz.</div>';return;}

  const mapa={};
  puntos.forEach(p=>{
    if(!mapa[p.user_id])mapa[p.user_id]={total:0,quiz:0,foro:0};
    mapa[p.user_id].total+=p.puntos;
    if(p.tipo==='quiz')mapa[p.user_id].quiz+=p.puntos;
    if(p.tipo.startsWith('foro'))mapa[p.user_id].foro+=p.puntos;
  });

  const ids=Object.keys(mapa);
  const{data:perfiles}=await sb.from('profiles').select('id,nombre_completo,email').in('id',ids);

  const ranking=ids.map(uid=>{
    const p=perfiles?.find(x=>x.id===uid)||{};
    return{uid,nombre:p.nombre_completo||p.email?.split('@')[0]||'—',email:'',...mapa[uid]};
  }).sort((a,b)=>b.total-a.total);

  // Mis puntos
  if(mapa[myId]){
    document.getElementById('misPuntos').style.display='grid';
    document.getElementById('miTotal').textContent=mapa[myId].total+' pts';
    document.getElementById('miQuiz').textContent=mapa[myId].quiz+' pts';
    document.getElementById('miForo').textContent=mapa[myId].foro+' pts';
  }

  // Podio
  if(ranking.length>0){
    document.getElementById('podio').style.display='grid';
    const set=(n,el,pt)=>{
      const r=ranking[n-1];
      if(r){document.getElementById(el).textContent=r.nombre.split(' ')[0];document.getElementById(pt).textContent=r.total+' pts';}
      else{document.getElementById(el).textContent='—';document.getElementById(pt).textContent='—';}
    };
    set(1,'p1n','p1p');set(2,'p2n','p2p');set(3,'p3n','p3p');
  }

  // Tabla
  document.getElementById('rankingWrap').innerHTML=`<div class="tbl-wrap"><table>
    <thead><tr><th style="width:50px">#</th><th>Doctor(a)</th><th>Puntos</th><th>Actividad</th></tr></thead>
    <tbody>${ranking.map((r,i)=>`<tr class="${r.uid===myId?'mi-pos':''}">
      <td style="font-family:'JetBrains Mono';font-weight:700;color:var(--muted);text-align:center">${i+1}</td>
      <td><div style="display:flex;align-items:center;gap:12px">
        <div class="av">${r.nombre.charAt(0).toUpperCase()}</div>
        <div><div style="font-weight:500;color:#fff">${r.nombre}${r.uid===myId?' 👤':''}</div>
        </div></div></td>
      <td><div class="pts">${r.total} pts</div><div style="font-size:10px;color:var(--muted);margin-top:2px">Quiz:${r.quiz} · Foro:${r.foro}</div></td>
      <td>${r.quiz>0?'<span class="badge bq">📝 Quiz</span>':''}${r.foro>0?'<span class="badge bf">💬 Foro</span>':''}</td>
    </tr>`).join('')}</tbody></table></div>`;
}

function fd(s){return new Date(s).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'});}
</script>
</body>
</html>
